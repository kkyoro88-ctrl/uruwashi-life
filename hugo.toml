baseURL = "https://uruwashi-life.com/"
languageCode = "ja"
title = "うるわし生活"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true

[params]
  defaultTheme = "light"
  author = "うるわし生活編集部"
  description = "30〜40代女性のための美容・スキンケア情報サイト。歳を重ねるほど美しくなるための本音レビューをお届けします。"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false
  DateFormat = "2006年1月2日"
  mainSections = ["posts"]

  # サイドバー プロフィール
  profileName = "うる"
  profileDesc = "40代・乾燥敏感肌。美容にお金をかけるたびに「なんか違う」で終わることを繰り返してきました。その失敗の数だけ、本当によかったものがわかる気がして、書き続けています。迷っている方の「これにしよう」が見つかれば嬉しいです。"

  # ホームページ カテゴリセクション
  [[params.homeSections]]
    name = "SKIN CARE"
    category = "スキンケア"
  [[params.homeSections]]
    name = "REVIEW"
    category = "口コミ・レビュー"
  [[params.homeSections]]
    name = "LIFESTYLE"
    category = "暮らし・美容グッズ"

[menu]
  [[menu.main]]
    identifier = "beauty"
    name = "BEAUTY"
    url = "/categories/スキンケア/"
