{{- $url := .Get "url" -}}
{{- $page := .Site.GetPage $url -}}
{{- if $page -}}
<div class="inline-related">
  <span class="inline-related-label">✓ あわせて読みたい</span>
  <a href="{{ $url }}" class="inline-related-inner">
    {{- with $page.Params.cover.image -}}
    <div class="inline-related-thumb">
      <img src="{{ . }}" alt="{{ $page.Title }}" loading="lazy">
    </div>
    {{- end -}}
    <div class="inline-related-body">
      <p class="inline-related-title">{{ $page.Title }}</p>
      <p class="inline-related-desc">{{ $page.Description | truncate 60 "…" }}</p>
    </div>
  </a>
</div>
{{- end -}}
