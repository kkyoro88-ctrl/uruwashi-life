{{- $currentPage := . }}
<header class="site-header">
  {{/* トップバー */}}
  <div class="top-bar">
    <span class="top-bar-tagline">30〜40代女性のための美容と暮らし</span>
    <div class="top-bar-sns">
      {{- with site.Params.xUrl }}
      <a href="{{ . }}" class="top-sns-link" target="_blank" rel="noopener" title="X(Twitter)" aria-label="X(Twitter)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.754l7.73-8.835-8.162-10.665h7.217l4.256 5.622 5.449-5.622z"/></svg>
      </a>
      {{- end }}
      <a href="/search/" class="top-sns-link" title="検索" aria-label="検索">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </a>
    </div>
  </div>

  {{/* メインナビ */}}
  <nav class="main-nav">
    <div class="nav-inner">
      <a class="site-logo" href="{{ "" | absLangURL }}" accesskey="h">
        <span class="logo-main">{{ site.Title }}</span>
        <span class="logo-sub">beauty &amp; life</span>
      </a>
      <button class="nav-toggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="main-nav-menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <ul class="nav-menu" id="main-nav-menu">
        {{- range site.Menus.main }}
        {{- $url := .URL | absLangURL }}
        <li>
          <a href="{{ .URL | absLangURL }}"
            {{- if eq $url ($currentPage.Permalink | absLangURL) }} class="active"{{- end }}>
            {{ .Name }}
          </a>
        </li>
        {{- end }}
        <li class="nav-search">
          <a href="/search/" title="検索" aria-label="検索">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </a>
        </li>
      </ul>
    </div>
  </nav>

</header>
