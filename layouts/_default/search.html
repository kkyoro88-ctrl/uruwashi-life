{{- define "main" }}
<div class="search-page-wrap">
  <div id="searchbox" class="searchbox searchbox--custom">
    <input id="searchInput"
      placeholder="{{ .Params.placeholder | default "キーワードで検索..." }}"
      aria-label="search" type="search" autocomplete="off" maxlength="64">
    <button class="search-btn" aria-label="検索" onclick="return false;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
  </div>
  <ul id="searchResults" class="searchResults" aria-label="search results"></ul>
</div>
<script>
// URLパラメータ ?q= があれば自動検索
(function() {
  var q = new URLSearchParams(window.location.search).get('q');
  if (!q) return;
  window.addEventListener('load', function() {
    var input = document.getElementById('searchInput');
    if (!input) return;
    input.value = q;
    // fuse.js の初期化（XHR）が終わるのを待ってから発火
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      input.dispatchEvent(new KeyboardEvent('keyup', {bubbles: true, cancelable: true}));
      var results = document.getElementById('searchResults');
      if ((results && results.children.length > 0) || tries > 20) {
        clearInterval(timer);
      }
    }, 150);
  });
})();
</script>
{{- end }}
